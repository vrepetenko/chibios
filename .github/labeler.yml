# ---------------------------------------------------------------------------
# Automatic PR label configuration for actions/labeler v5.
#
# Label rules use the "any" (match if any glob matches) strategy by default.
# Each top-level key is the exact label name that must exist in the repo.
# Labels are created/updated by the GitHub Actions workflow in
# .github/workflows/labeler.yml; this file controls assignment rules only.
# ---------------------------------------------------------------------------

# ── RTOS cores ──────────────────────────────────────────────────────────────
rt:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/rt/**'
      - 'test/rt/**'
      - 'testrt/**'

nil:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/nil/**'
      - 'test/nil/**'

oslib:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/oslib/**'
      - 'test/oslib/**'

# ── HAL ─────────────────────────────────────────────────────────────────────
hal:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/**'
      - 'test/hal/**'
      - 'testhal/**'
      - 'testex/**'

xhal:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/xhal/**'
      - 'testxhal/**'

# ── STM32 port families ──────────────────────────────────────────────────────
port/STM32:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/**'
      - 'demos/STM32/**'
      - 'testhal/STM32/**'

port/STM32F0:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32F0xx/**'
      - 'os/hal/ports/STM32/STM32C0xx/**'
      - 'testhal/STM32/STM32F0xx/**'

port/STM32F1:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32F1xx/**'
      - 'testhal/STM32/STM32F1xx/**'

port/STM32F3:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32F3xx/**'
      - 'os/hal/ports/STM32/STM32F37x/**'
      - 'testhal/STM32/STM32F3xx/**'
      - 'testhal/STM32/STM32F37x/**'

port/STM32F4:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32F4xx/**'
      - 'testhal/STM32/STM32F4xx/**'

port/STM32F7:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32F7xx/**'
      - 'testhal/STM32/STM32F7xx/**'

port/STM32G0:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32G0xx/**'
      - 'testhal/STM32/STM32G0xx/**'

port/STM32G4:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32G4xx/**'
      - 'testhal/STM32/STM32G4xx/**'

port/STM32H5:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32H5xx/**'

port/STM32H7:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32H7xx/**'
      - 'testhal/STM32/STM32H7xx/**'

port/STM32L0:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32L0xx/**'

port/STM32L1:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/STM32/STM32L1xx/**'
      - 'testhal/STM32/STM32L1xx/**'

port/STM32L4:
  - changed-files:
    - any-glob-to-any-file:
