# ── Other port families ──────────────────────────────────────────────────────
port/AVR:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/AVR/**'
      - 'demos/AVR/**'
      - 'testhal/AVR/**'

port/RP:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/RP/**'
      - 'demos/RP/**'
      - 'testhal/RP/**'

port/SPC5:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/hal/ports/SPC5/**'
      - 'demos/SPC5/**'

# ── Sandbox (SB / VIO) ───────────────────────────────────────────────────────
sandbox:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/sb/**'
      - 'testsb/**'
      - 'os/xhal/ports/SB/**'

# ── VFS ─────────────────────────────────────────────────────────────────────
vfs:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/vfs/**'
      - 'os/vns/**'

# ── EX (external devices) ────────────────────────────────────────────────────
ex:
  - changed-files:
    - any-glob-to-any-file:
      - 'os/ex/**'
      - 'testex/**'

# ── Code generation / templates ─────────────────────────────────────────────
codegen:
  - changed-files:
    - any-glob-to-any-file:
      - 'tools/ftl/**'
      - 'tools/updater/**'
      - 'os/xhal/codegen/**'

# ── Demos ────────────────────────────────────────────────────────────────────
demos:
  - changed-files:
    - any-glob-to-any-file:
      - 'demos/**'

# ── Tests ────────────────────────────────────────────────────────────────────
tests:
  - changed-files:
    - any-glob-to-any-file:
      - 'test/**'
      - 'testhal/**'
      - 'testex/**'
      - 'testrt/**'
      - 'testsb/**'
      - 'testxhal/**'

# ── Documentation ────────────────────────────────────────────────────────────
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'doc/**'
      - '**/*.md'
      - '**/*.html'
      - '**/dox/**'

# ── CI / tooling ─────────────────────────────────────────────────────────────
ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
      - '.devcontainer/**'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/docker-compose.yml'
      - '**/docker-compose.yaml'
      - '**/compose.yml'
      - '**/compose.yaml'
      - 'tools/workflows/**'
      - 'tools/style/**'
      - 'tools/mk/**'
      - 'tools/calc/**'

# ── External / submodules ────────────────────────────────────────────────────
external:
  - changed-files:
    - any-glob-to-any-file:
      - 'ext/**'
      - '.gitmodules'
